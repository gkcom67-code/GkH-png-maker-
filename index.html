<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GkH PNG Studio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding:15px;
background:linear-gradient(135deg,#020617,#071126,#0f172a);
overflow-x:hidden;
color:white;
}

body::before{
content:"";
position:fixed;
width:420px;
height:420px;
background:#00ffb3;
top:-180px;
left:-150px;
border-radius:50%;
filter:blur(120px);
opacity:0.15;
z-index:-2;
}

body::after{
content:"";
position:fixed;
width:350px;
height:350px;
background:#008cff;
bottom:-150px;
right:-120px;
border-radius:50%;
filter:blur(120px);
opacity:0.14;
z-index:-2;
}

.container{
width:100%;
max-width:420px;
margin:auto;
background:rgba(15,23,42,0.82);
backdrop-filter:blur(18px);
padding:22px;
border-radius:28px;
text-align:center;
border:1px solid rgba(255,255,255,0.06);
box-shadow:
0 0 30px rgba(0,255,180,0.15),
0 0 60px rgba(0,140,255,0.08);
}

.profile-logo{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
margin-bottom:25px;
}

.profile-logo img{
width:115px;
height:115px;
border-radius:50%;
object-fit:cover;
border:4px solid #00ffb3;
box-shadow:
0 0 20px #00ffb3,
0 0 40px rgba(0,255,180,0.35);
margin-bottom:15px;
}

.profile-logo h1{
font-size:32px;
font-weight:bold;
background:linear-gradient(45deg,#00ffb3,#00c6ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.profile-logo p{
margin-top:8px;
font-size:14px;
color:#cbd5e1;
}

.premium-upload{
display:flex;
justify-content:center;
margin-top:30px;
cursor:pointer;
}

.premium-upload input{
display:none;
}

.premium-box{
position:relative;
width:100%;
max-width:320px;
height:220px;
margin:auto;
background:linear-gradient(145deg,
rgba(17,24,39,0.95),
rgba(30,41,59,0.92));
border-radius:30px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
overflow:hidden;
border:1px solid rgba(0,255,180,0.15);
box-shadow:
0 0 25px rgba(0,255,180,0.15),
inset 0 0 15px rgba(255,255,255,0.03);
transition:0.4s;
}

.premium-box:hover{
transform:translateY(-5px) scale(1.02);
}

.circle-glow{
position:absolute;
width:180px;
height:180px;
background:rgba(0,255,180,0.08);
border-radius:50%;
top:-60px;
right:-50px;
filter:blur(10px);
}

.upload-icon{
font-size:60px;
color:#00ffb3;
margin-bottom:15px;
z-index:1;
}

.premium-box h2{
font-size:28px;
color:white;
margin-bottom:8px;
z-index:1;
}

.premium-box p{
font-size:14px;
color:#cbd5e1;
margin-bottom:15px;
z-index:1;
}

.premium-box span{
display:flex;
justify-content:center;
align-items:center;
width:180px;
height:52px;
background:#00ffb3;
color:black;
border-radius:30px;
font-size:17px;
font-weight:bold;
z-index:1;
box-shadow:0 0 15px rgba(0,255,180,0.3);
}

.preview{
display:none;
margin-top:25px;
}

.preview img{
width:100%;
border-radius:20px;
box-shadow:0 0 20px rgba(0,255,180,0.15);
}

.buttons{
display:flex;
justify-content:center;
margin-top:20px;
}

button{
padding:14px 26px;
border:none;
border-radius:16px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-3px) scale(1.03);
}

.convert-btn{
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
}

.design-box{
margin-top:25px;
background:#111827;
padding:22px;
border-radius:25px;
}

.design-box h2{
font-size:24px;
margin-bottom:18px;
color:#00ffb3;
}

.design-buttons{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.design-buttons button{
padding:10px 16px;
border:none;
border-radius:14px;
background:#1e293b;
color:white;
font-size:14px;
font-weight:bold;
}

.contact-title{
margin-top:35px;
margin-bottom:18px;
font-size:26px;
font-weight:bold;
color:#00ffb3;
}

.bottom-contact{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:12px;
}

.facebook-btn{
background:linear-gradient(45deg,#1877f2,#00a2ff);
color:white;
}

.whatsapp-btn{
background:linear-gradient(45deg,#25d366,#00ff95);
color:white;
}

.footer{
margin-top:30px;
font-size:13px;
color:#94a3b8;
}

</style>
</head>
<body>

<div class="container">

<div class="profile-logo">

<img src="gkh-profile.png" alt="GkH Logo">

<h1>GkH PNG Studio</h1>

<p>Free PNG Converter & HD Image Tool</p>

</div>

<label class="premium-upload">

<input type="file" id="imageInput" accept="image/*">

<div class="premium-box">

<div class="circle-glow"></div>

<div class="upload-icon">
☁
</div>

<h2>Upload Image</h2>

<p>Transparent PNG Converter</p>

<span>Click Here</span>

</div>

</label>

<div class="preview" id="previewBox">

<img id="previewImage">

<div class="buttons">

<button class="convert-btn" onclick="convertPNG()">
Remove BG & Download PNG
</button>

</div>

</div>

<div class="design-box">

<h2>Background Effects</h2>

<div class="design-buttons">

<button onclick="changeBg('#020617')">Black</button>
<button onclick="changeBg('#1e1b4b')">Purple</button>
<button onclick="changeBg('#14532d')">Green</button>
<button onclick="gradient1()">Sky</button>
<button onclick="gradient2()">Neon</button>
<button onclick="gradient3()">Sunset</button>
<button onclick="gradient4()">Galaxy</button>

</div>

</div>

<h2 class="contact-title">
Contact Me
</h2>

<div class="bottom-contact">

<a href="https://www.facebook.com/share/1CF3sNgb8Q/" target="_blank">
<button class="facebook-btn">Facebook</button>
</a>

<a href="https://wa.me/9609150448" target="_blank">
<button class="whatsapp-btn">WhatsApp</button>
</a>

</div>

<div class="footer">
© GkH PNG Studio 2026
</div>

</div>

<script>

const imageInput = document.getElementById("imageInput");
const previewImage = document.getElementById("previewImage");
const previewBox = document.getElementById("previewBox");

let uploadedFile;

imageInput.addEventListener("change", function(){

uploadedFile = this.files[0];

if(uploadedFile){

const reader = new FileReader();

reader.onload = function(e){

previewImage.src = e.target.result;
previewBox.style.display = "block";

}

reader.readAsDataURL(uploadedFile);

}

});

async function convertPNG(){

if(!uploadedFile){

alert("Upload Image First");
return;

}

const formData = new FormData();

formData.append("image_file", uploadedFile);
formData.append("size", "auto");

try{

alert("Background Removing... Please Wait");

const response = await fetch("https://api.remove.bg/v1.0/removebg",{

method:"POST",

headers:{
"X-Api-Key":"yYBJuTq2Cu7VmYnBdJYTkkMu"
},

body:formData

});

if(!response.ok){

throw new Error("API Error");

}

const blob = await response.blob();

const url = URL.createObjectURL(blob);

previewImage.src = url;

const link = document.createElement("a");

link.href = url;
link.download = "GkH-PNG.png";

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

alert("Transparent PNG Downloaded Successfully");

}catch(error){

alert("Background Remove Failed");

console.log(error);

}

}

function changeBg(color){

document.body.style.background = color;

}

function gradient1(){

document.body.style.background =
"linear-gradient(135deg,#00c6ff,#0072ff)";

}

function gradient2(){

document.body.style.background =
"linear-gradient(135deg,#00ff99,#0066ff)";

}

function gradient3(){

document.body.style.background =
"linear-gradient(135deg,#ff512f,#dd2476)";

}

function gradient4(){

document.body.style.background =
"linear-gradient(135deg,#7928ca,#ff0080)";

}

</script>

</body>
</html>
